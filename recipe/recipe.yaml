schema_version: 1

context:
  name: roboverse-py
  # The latest version available on PyPI (0.1.17) has excessive dependency
  # version pinning, which includes optional dependencies as required ones.
  # The latest commit has more relaxed dependency constraints, so use that
  # commit as the source and version it as 0.1.17.99 until a new release exists.
  version: "0.1.17.99"
  commit: 47b3ebfd55e96117ec2ee4000b6a6a8f6018c182
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  # TODO: Change URL to PyPI once a new version is available.
  # https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/roboverse_py-${{ version }}.tar.gz
  url: https://github.com/RoboVerseOrg/RoboVerse/archive/${{ commit }}.tar.gz
  sha256: d850f5a8fa5cacbe146a3913d0facc47d668cff5f5eefd9c1ada4003efd5a92c

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - dm-control
    - fsspec
    - gymnasium
    - huggingface_hub
    - imageio
    - imageio-ffmpeg
    - loguru
    - mujoco-python
    - numpy <2
    - py-opencv
    - pybullet
    - python >=${{ python_min }},<3.11
    - pytorch
    - rich
    - rootutils
    - torchvision
    - tqdm
    - tyro

tests:
  - script:
      - pip check
      - python -c "import metasim"
      - python run_test.py
    files:
      recipe:
        - run_test.py
    requirements:
      run:
        - pip
        - python ${{ python_min }}.*
        - pytorch * cpu*
        - torchvision * cpu*

about:
  homepage: https://github.com/RoboVerseOrg/RoboVerse
  repository: https://github.com/RoboVerseOrg/RoboVerse
  summary: Towards a Unified Platform, Dataset and Benchmark for Scalable and Generalizable Robot Learning
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jeongseok-meta
